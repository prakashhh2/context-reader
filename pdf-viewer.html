<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF — Context Reader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #525659; font-family: sans-serif; }

    #toolbar {
      position: sticky; top: 0; z-index: 100;
      background: #404040; color: white;
      padding: 10px 16px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    #toolbar .logo { font-size: 16px; }
    #toolbar .title { font-size: 14px; font-weight: 500; }
    #page-info { margin-left: auto; color: #aaa; font-size: 12px; }

    #status {
      color: white; text-align: center;
      padding: 60px 20px; font-size: 15px; line-height: 1.6;
    }
    #status.error { color: #ff7b7b; }

    #pdf-container {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
      gap: 20px;
    }

    .page-wrapper {
      position: relative;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      background: white;
    }

    canvas { display: block; }

    .textLayer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden;
      user-select: text;
      pointer-events: all;
    }
    .textLayer span {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
      line-height: 1;
    }
    .textLayer ::selection {
      background: rgba(0, 100, 255, 0.25);
      color: transparent;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span class="logo">📄</span>
    <span class="title">Context Reader — PDF Viewer</span>
    <span id="page-info"></span>
  </div>
  <div id="status">Loading PDF...</div>
  <div id="pdf-container"></div>
  <script src="pdf-viewer.js"></script>
  <link rel="stylesheet" href="content.css">
  <script src="content.js"></script>
</body>
</html>
